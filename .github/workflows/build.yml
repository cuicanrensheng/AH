name: Build LineageOS 18.1 (360 N7)
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build Type
        required: true
        default: userdebug
        type: choice
        options:
          - userdebug
          - eng

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python3-pip python-is-python3
          sudo pip3 install repo
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"

      - name: Create Swap (Safe Version)
        run: |
          # 先清理可能存在的旧swap文件
          sudo swapoff -a || true
          sudo rm -f /swapfile
          # 创建24G swap
          sudo fallocate -l 24G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Sync Source
        run: |
          mkdir -p ~/los && cd ~/los
          repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1
          mkdir -p .repo/local_manifests
          cp $GITHUB_WORKSPACE/.repo/local_manifests/n7.xml .repo/local_manifests/
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Build
        run: |
          cd ~/los
          source build/envsetup.sh
          lunch lineage_n7-${{ github.event.inputs.build_type }}
          make bacon -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lineage-18.1-n7
          path: ~/los/out/target/product/n7/lineage-18.1-*.zip
