name: Build TV Live APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 自动生成 Gradle Wrapper
        run: gradle wrapper --gradle-version 9.5.1

      - name: 赋予执行权限
        run: chmod +x gradlew

      # 先清理缓存、刷新依赖，再编译
      - name: 清理并刷新依赖
        run: ./gradlew clean --refresh-dependencies

      # 关键：添加 --stacktrace 打印清单错误的具体行号
      - name: 编译 Release 签名版 APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 上传成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/*.apk
