name: Build TV Live APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 直接下载 gradlew，不用手动生成
      - name: 下载 Gradle Wrapper
        run: |
          curl -s https://services.gradle.org/distributions/gradle-9.5.1-bin.zip -o gradle.zip
          unzip -q gradle.zip
          cp gradle-9.5.1/bin/gradlew ./
          chmod +x gradlew

      - name: 编译 Release 签名版 APK
        run: ./gradlew assembleRelease

      - name: 上传成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/*.apk
