name: 电视直播APP云编译（修复版）
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      # 1. 强制生成/修复gradle-wrapper文件（自动补全缺失的jar）
      - name: 强制生成Gradle Wrapper
        run: |
          # 用gradle命令自动生成wrapper，会自动下载gradle-wrapper.jar
          gradle wrapper --gradle-version 8.7

      # 2. 给脚本添加执行权限
      - name: 授权Gradle脚本
        run: chmod +x gradlew

      # 3. 编译Release版本
      - name: 编译Release版本
        run: ./gradlew assembleRelease

      - name: 上传编译好的APK
        uses: actions/upload-artifact@v4
        with:
          name: TV直播APP-Release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
