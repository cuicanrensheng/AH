name: Build TV Live APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 JDK 17 + Gradle 缓存
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 缓存 Gradle 分发文件，避免每次都下载
      - name: 缓存 Gradle 分发文件
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: 自动生成 Gradle Wrapper
        run: gradle wrapper --gradle-version 9.5.1

      - name: 赋予执行权限
        run: chmod +x gradlew

      # 优化构建命令，只在必要时刷新依赖
      - name: 编译 Release 签名版 APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 生成 update.json
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.$VERSION_CODE"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION_CODE/app-release.apk"
          cat > update.json << EOF
          {
            "versionCode": $VERSION_CODE,
            "versionName": "$VERSION_NAME",
            "message": "自动更新版本",
            "downloadUrl": "$DOWNLOAD_URL"
          }
          EOF

      - name: 上传成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/*.apk

      - name: 上传更新配置
        uses: actions/upload-artifact@v4
        with:
          name: update-config
          path: update.json

      - name: 创建发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 自动发布 v${{ github.run_number }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
