name: Build TV Live APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 手动安装 OpenJDK 17
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

      - name: 自动生成 Gradle Wrapper
        run: gradle wrapper --gradle-version 9.5.1

      - name: 赋予执行权限
        run: chmod +x gradlew

      - name: 清理并刷新依赖
        run: ./gradlew clean --refresh-dependencies

      - name: 编译 Release 签名版 APK
        run: ./gradlew assembleRelease --stacktrace

      # ====================== 自动生成 update.json（核心）======================
      - name: 生成自动更新配置文件
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.$VERSION_CODE"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION_CODE/app-release.apk"
          cat > update.json << EOF
          {
            "versionCode": $VERSION_CODE,
            "versionName": "$VERSION_NAME",
            "message": "优化播放、修复画面比例、完善自动更新",
            "downloadUrl": "$DOWNLOAD_URL"
          }
          EOF

      # ====================== 上传APK ======================
      - name: 上传成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/*.apk

      # ====================== 上传更新配置 ======================
      - name: 上传 update.json
        uses: actions/upload-artifact@v4
        with:
          name: update-config
          path: update.json

      # ====================== 自动发布 Release（APP可更新）======================
      - name: 创建并发布新版本
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 自动发布 v${{ github.run_number }}
          body: |
            自动构建版本
            版本号：${{ github.run_number }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
