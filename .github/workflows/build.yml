name: Build TV Live APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 关键：给 gradlew 加上执行权限
      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 编译 Release 签名版 APK
        run: ./gradlew assembleRelease

      - name: 上传成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/*.apk
