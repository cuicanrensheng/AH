name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Auto create default icon folders
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/values

      - name: Auto generate default ic_launcher png
        run: |
          convert -size 48x48 xc:#cccccc app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72 xc:#cccccc app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96 xc:#cccccc app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:#cccccc app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:#cccccc app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Create adaptive icon xml
        run: |
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/white"/>
          </adaptive-icon>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/white"/>
          </adaptive-icon>
          EOF

      - name: Create colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

      - name: Grant execute permission
        run: chmod +x gradlew

      # ========== 我已经帮你加好：无混淆、无资源压缩、跳过Lint、编译全组件Release包 ==========
      - name: Clean & Build Release 无混淆无压缩 全组件
        run: |
          ./gradlew clean \
          assembleRelease \
          -x lintVitalRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: app/build/outputs/apk/release/*.apk
