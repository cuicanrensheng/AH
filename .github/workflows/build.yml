name: Build TV Live APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 生成 Gradle 包装脚本
        run: gradle wrapper --gradle-version 9.5.1

      - name: 赋予脚本执行权限
        run: chmod +x gradlew

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 上传成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/*.apk
