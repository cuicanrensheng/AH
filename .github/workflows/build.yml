name: Build TV Live APK
# 只要main分支有代码提交就自动编译
on:
  push:
    branches: [ main ]
  # 手动也能点按钮触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予执行权限
        run: chmod +x gradlew

      - name: 编译Release APK
        run: ./gradlew assembleRelease

      - name: 上传APK成品
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APK
          path: app/build/outputs/apk/release/*.apk
