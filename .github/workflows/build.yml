name: TV Live App Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      # 适配你当前已有的gradle-wrapper.jar，用和AGP 8.3.0兼容的Gradle 8.4
      - name: 授权Gradle脚本
        run: chmod +x gradlew

      - name: 编译Release版本
        run: ./gradlew assembleRelease

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: TV-Live-App-Release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
