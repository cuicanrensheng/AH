name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 直接用项目里已有的 release.keystore，无需额外生成
      - name: Verify keystore exists
        run: |
          if [ ! -f app/release.keystore ]; then
            echo "ERROR: release.keystore not found in app/ directory"
            exit 1
          fi

      # 自动生成系统默认图标
      - name: Create default icon resources
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-hdpi/ic_launcher_round.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-mdpi/ic_launcher_round.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-xhdpi/ic_launcher_round.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-xxhdpi/ic_launcher_round.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp /usr/share/android-sdk/platforms/android-34/data/res/mipmap-xxxhdpi/ic_launcher_round.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Release-APK
          path: app/build/outputs/apk/release/*.apk
