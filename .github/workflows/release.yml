name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 👇 关键步骤：自动生成 Gradle Wrapper
      - name: 生成 Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type all

      - name: 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 构建 Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 生成 update.json
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.$VERSION_CODE"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION_CODE/app-release.apk"
          cat > update.json << EOF
          {
            "versionCode": $VERSION_CODE,
            "versionName": "$VERSION_NAME",
            "message": "自动更新版本",
            "downloadUrl": "$DOWNLOAD_URL"
          }
          EOF

      - name: 上传 APK 成品
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/app-release.apk

      - name: 创建并发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 自动发布 v${{ github.run_number }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
