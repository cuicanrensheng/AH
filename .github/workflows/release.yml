name: 自动发布版本
on:
  workflow_run:
    workflows: ["Build TV Live APK"]
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: TVLive-APP
          path: ./apk

      - name: 创建发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 自动构建版本 v${{ github.run_number }}
          body: 由GitHub Actions自动编译
          files: ./apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
