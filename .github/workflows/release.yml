name: Build & Release

on:
  push:
    branches: [ main ]  # 或你实际的主分支名
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          

      - name: 构建 APK
       run: |
        chmod +x ./gradlew
        ./gradlew assembleRelease

      - name: 上传构建产物（给后续步骤使用）
        uses: actions/upload-artifact@v4
        with:
          name: TVLive-直播APP
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: TVLive-直播APP

      - name: 生成 update.json
        run: |
          cat > update.json <<EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "1.${{ github.run_number }}",
            "message": "修复了EPG显示问题，新增二维码扫码设置和画面比例切换",
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-release.apk"
          }
          EOF

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: "版本 v${{ github.run_number }} 发布"
          files: |
            app-release.apk
            update.json
