plugins {
    id 'com.android.application'
}

android {
    namespace "com.tv.live"
    compileSdk 34

    defaultConfig {
        applicationId "com.tv.live.custom"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }

    signingConfigs {
        release {
            // 直接使用相对路径，Gradle 会从 app/ 目录下查找
            storeFile file("build/auto-release.jks")
            storePassword System.getenv("KS_PASS", "auto1234")
            keyAlias System.getenv("KS_ALIAS", "auto")
            keyPassword System.getenv("KEY_PASS", "auto1234")
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            debuggable true
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-extractor:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-dash:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-hls:2.19.1'
}
