plugins {
    id 'com.android.application'
}

android {
    namespace "com.tv.live"
    compileSdk 34

    defaultConfig {
        applicationId "com.tv.live.custom"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }

    // 【已修正】自动适配 Actions 动态密钥
    signingConfigs {
        release {
            // 优先读取 Actions 传入的路径，本地构建 fallback 到默认值
            storeFile file(System.getenv("KS_FILE") ?: "app/build/auto-release.jks")
            storePassword System.getenv("KS_PASS") ?: "auto1234"
            keyAlias System.getenv("KS_ALIAS") ?: "auto"
            keyPassword System.getenv("KEY_PASS") ?: "auto1234"
        }
    }

    buildTypes {
        release {
            // 关闭混淆、关闭资源压缩 防闪退
            minifyEnabled false
            shrinkResources false
            debuggable true
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // ExoPlayer 全组件
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-extractor:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-dash:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-hls:2.19.1'
}
