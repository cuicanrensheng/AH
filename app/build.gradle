plugins {
    id 'com.android.application'
}

android {
    namespace "com.tv.live"
    compileSdk 34

    // ========== 新增：固定Java版本，解决注解编译空指针 ==========
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.tv.live"
        minSdk 21
        targetSdk 34
        versionCode 20
        versionName "2.0"
        multiDexEnabled true

        buildConfigField "int", "VERSION_CODE", "${versionCode}"
        buildConfigField "String", "VERSION_NAME", "\"${versionName}\""
    }

    signingConfigs {
        release {
            storeFile file("../release.keystore")
            storePassword "admin123"
            keyAlias "myreleasekey"
            keyPassword "admin123"
        }
        debug {
            storeFile file("../debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            crunchPngs false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    packagingOptions {
        resources {
            pickFirsts += ['META-INF/com.android.tools/proguard/coroutines.pro']
        }
    }
}

dependencies {
    // Android 基础
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.11.0"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"
    implementation "androidx.recyclerview:recyclerview:1.3.2"

    // 二维码
    implementation 'com.google.zxing:core:3.5.1'

    // JSON
    implementation 'com.google.code.gson:gson:2.10.1'

    // ExoPlayer 统一版本 2.19.1 (保持不变，版本兼容)
    implementation "com.google.android.exoplayer:exoplayer:2.19.1"
    implementation "com.google.android.exoplayer:exoplayer-ui:2.19.1"
    implementation "com.google.android.exoplayer:exoplayer-hls:2.19.1"
    implementation "com.google.android.exoplayer:exoplayer-dash:2.19.1"

    // 网络
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation "com.squareup.retrofit2:retrofit:2.11.0"
    implementation "com.squareup.retrofit2:converter-gson:2.11.0"

    // ========== 修复Glide编译冲突：升级Glide + 配套注解编译器 ==========
    implementation "com.github.bumptech.glide:glide:4.16.0"
    annotationProcessor "com.github.bumptech.glide:compiler:4.16.0"
    // 新增：AndroidX 标准注解库，修复 TypeElement 空指针
    annotationProcessor "androidx.annotation:annotation:1.8.0"

    // 工具
    implementation "org.apache.commons:commons-lang3:3.14.0"
    implementation "com.blankj:utilcodex:1.31.1"
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
}
