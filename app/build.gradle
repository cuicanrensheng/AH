plugins {
    id 'com.android.application'
}

android {
    namespace "com.tv.live"
    compileSdk 34

    defaultConfig {
        applicationId "com.tv.live"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }

        // 强制开启完整打包，不精简任何资源和依赖
        vectorDrawables.useSupportLibrary = true
        multiDexEnabled true
    }

    signingConfigs {
        release {
            storeFile file("release.keystore")
            storePassword "admin123"
            keyAlias "myreleasekey"
            keyPassword "admin123"
        }
    }

    buildTypes {
        release {
            // 关闭所有压缩和混淆，强制保留全部代码和资源
            minifyEnabled false
            shrinkResources false
            debuggable false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    // 强制打包所有 assets，不压缩
    aaptOptions {
        noCompress 'html', 'js', 'css', 'json', 'm3u', 'xml', 'gz', 'ts'
    }

    // 强制包含所有依赖，不裁剪
    packagingOptions {
        pickFirst 'META-INF/*'
        exclude 'META-INF/*.SF'
        exclude 'META-INF/*.DSA'
        exclude 'META-INF/*.RSA'
    }
}

dependencies {
    // 基础安卓依赖
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // ExoPlayer 全套（带解码器）
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-extractor:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-dash:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-hls:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-core:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-rtmp:2.19.1'

    // 新增：VLC 播放器 SDK（体积大头，直接+30MB）
    implementation 'de.mrmaffen:vlc-android-sdk:4.0.0'

    // 内置Web服务 10481端口
    implementation 'org.nanohttpd:nanohttpd-webserver:2.3.1'

    // 网络请求、IPv6适配
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // 解析M3U/TVBox/XML节目单
    implementation 'org.jsoup:jsoup:1.17.2'

    // 本地缓存、配置存储
    implementation 'androidx.datastore:datastore-preferences:1.0.0'

    // JSON解析，导入导出数据
    implementation 'com.google.code.gson:gson:2.10.1'

    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
