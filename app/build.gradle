plugins {
    id 'com.android.application'
}

android {
    namespace "com.tv.live"
    compileSdk 34

    defaultConfig {
        applicationId "com.tv.live.custom"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }

    // 自动适配 Actions 动态密钥，不用写死密码
    signingConfigs {
        release {
            storeFile file(System.getenv("KS_FILE", "debug.keystore"))
            storePassword System.getenv("KS_PASS", "android")
            keyAlias System.getenv("KS_ALIAS", "androiddebugkey")
            keyPassword System.getenv("KEY_PASS", "android")
        }
    }

    buildTypes {
        release {
            // 关闭混淆、关闭资源压缩 防闪退
            minifyEnabled false
            shrinkResources false
            debuggable true
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // ExoPlayer 全组件
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-extractor:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-dash:2.19.1'
    implementation 'com.google.android.exoplayer:exoplayer-hls:2.19.1'
}
