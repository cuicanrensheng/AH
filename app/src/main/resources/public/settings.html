<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVLive 高级设置</title>
    <style>
        *{box-sizing: border-box;margin:0;padding:0;}
        body {
            font-family: "Microsoft Yahei",sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
            background: #f5f5f5;
        }
        .container{
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 8px #eee;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #444;
        }
        input,textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        textarea{height:80px;resize:none;}
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 11px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            margin-top: 8px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .source-list{
            margin-top:10px;
            border:1px solid #eee;
            border-radius:4px;
            max-height:180px;
            overflow-y:auto;
        }
        .source-item{
            padding:8px 10px;
            border-bottom:1px solid #f1f1f1;
            cursor:pointer;
            font-size:13px;
            word-break:break-all;
        }
        .source-item:hover{background:#f8f9fa;}
        .hide{display:none;}
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 TVLive 高级设置</h1>

        <div id="pwdArea">
            <div class="form-group">
                <label>访问密码</label>
                <input type="password" id="pwdInput" placeholder="请输入管理密码">
            </div>
            <button onclick="checkPwd()">验证并进入</button>
        </div>

        <div id="mainArea" class="hide">
            <div class="form-group">
                <label>自定义直播源地址</label>
                <textarea id="liveUrl" placeholder="粘贴 m3u / m3u8 链接"></textarea>
                <div class="source-list" id="sourceList">
                    <div class="source-item" onclick="selectSource(this)">https://gitee.com/qf_1111/iptv/raw/master/playlist.m3u</div>
                </div>
            </div>

            <div class="form-group">
                <label>EPG 节目单地址</label>
                <input type="text" id="epgUrl" placeholder="xml / xml.gz 地址">
            </div>

            <button onclick="saveConfig()">保存并同步到设备</button>
            <div id="status" class="status"></div>
        </div>
    </div>

<script>
const ADMIN_PWD = "123456";
let baseUrl = "";

window.onload = function(){
    baseUrl = window.location.origin;
    document.getElementById('liveUrl').value = localStorage.getItem('liveUrl') || '';
    document.getElementById('epgUrl').value = localStorage.getItem('epgUrl') || '';
};

function checkPwd(){
    let pwd = document.getElementById('pwdInput').value.trim();
    if(pwd === ADMIN_PWD){
        document.getElementById('pwdArea').classList.add('hide');
        document.getElementById('mainArea').classList.remove('hide');
    }else{
        alert("密码错误，无法进入管理界面");
    }
}

function selectSource(el){
    document.getElementById('liveUrl').value = el.innerText.trim();
}

function saveConfig(){
    let liveUrl = document.getElementById('liveUrl').value.trim();
    let epgUrl = document.getElementById('epgUrl').value.trim();
    let statusEl = document.getElementById('status');

    localStorage.setItem('liveUrl', liveUrl);
    localStorage.setItem('epgUrl', epgUrl);

    fetch(baseUrl + "/config", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            liveUrl: liveUrl,
            epgUrl: epgUrl
        })
    })
    .then(res => res.json())
    .then(ret => {
        if(ret.success){
            statusEl.className = "status success";
            statusEl.innerText = "✅ 同步成功！电视端已自动刷新";
        }else{
            throw new Error('同步失败');
        }
    })
    .catch(() => {
        statusEl.className = "status error";
        statusEl.innerText = "⚠️ 已保存本地，APP 重启生效";
    });
    statusEl.style.display = "block";
}
</script>
</body>
</html>
